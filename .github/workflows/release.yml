# Release workflow — triggers when a version tag is pushed (e.g. v0.1.0).
# Builds cross-platform binaries, creates GitHub Release, pushes Docker images
# to ghcr.io using GoReleaser.
#
# To trigger a release:
#   git tag v0.1.0
#   git push origin v0.1.0

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write        # create GitHub releases + upload assets
  packages: write        # push to ghcr.io
  id-token: write        # needed for keyless signing (future)

jobs:
  release:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # GoReleaser needs full history for changelog
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.25.12"
          cache: true

      # Gate the release on the test suite. CI does not run on tag pushes, so a
      # broken commit could otherwise be tagged and published; this fails the
      # release before any artifact is built.
      - name: Gate release on tests
        run: |
          go build ./...
          go vet ./...
          go test -short -race ./...

      - name: Set up QEMU (for cross-platform Docker builds)
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify embedded catalog backup
        run: go test ./models -run TestCatalogBackupParseable -count=1

      # cosign signs the checksum file and the Docker images (keyless, via the
      # workflow's OIDC token); syft generates the SBOMs. Both must be on PATH
      # for the GoReleaser signs/sboms stages below.
      - name: Install cosign
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1

      - name: Install syft (SBOM generator)
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Generate release notes
        env:
          # Used by scripts/generate_release_notes.sh to query the GitHub
          # compare API for the per-PR author list (Contributors section).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/generate_release_notes.sh "${GITHUB_REF_NAME}" "${RUNNER_TEMP}/release-notes.md"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --release-notes="${{ runner.temp }}/release-notes.md"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify-discord:
    name: Discord Release Notification
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Generate release notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/generate_release_notes.sh "${GITHUB_REF_NAME}" "${RUNNER_TEMP}/release-notes.md"

      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          NOTES=$(head -c 1800 "${RUNNER_TEMP}/release-notes.md")
          RELEASE_URL="https://github.com/${REPO}/releases/tag/${TAG}"

          PAYLOAD=$(jq -n \
            --arg title "Ferro Labs AI Gateway ${TAG}" \
            --arg url "$RELEASE_URL" \
            --arg desc "$NOTES" \
            '{
              embeds: [{
                title: $title,
                url: $url,
                description: $desc,
                color: 16744448
              }]
            }')

          curl -sf -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK"
