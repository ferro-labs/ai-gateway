# Ferro Labs AI Gateway Configuration Example
# Copy to config.yaml and customize.

strategy:
  mode: fallback  # single | fallback | loadbalance | conditional

targets:
  - virtual_key: openai
    retry:
      attempts: 3
  - virtual_key: anthropic
  - virtual_key: xai
  - virtual_key: gemini
  - virtual_key: mistral
  - virtual_key: groq
  - virtual_key: together
  - virtual_key: cohere
  - virtual_key: deepseek
  - virtual_key: perplexity
  - virtual_key: fireworks
  - virtual_key: ai21
  - virtual_key: replicate
  - virtual_key: bedrock
  - virtual_key: azure-openai
  - virtual_key: azure-foundry
  - virtual_key: vertex-ai
  - virtual_key: hugging-face
  - virtual_key: ollama

# Model aliases: map friendly names to actual model IDs.
# Aliases are resolved before routing and plugin execution.
aliases:
  fast: gpt-4o-mini
  smart: claude-3-5-sonnet-20241022
  cheap: gemini-1.5-flash
  code: deepseek-coder

# Optional plugins
plugins:
  - name: word-filter
    type: guardrail
    stage: before_request
    enabled: true
    config:
      blocked_words: ["password", "secret"]
      case_sensitive: false

  - name: max-token
    type: guardrail
    stage: before_request
    enabled: true
    config:
      max_tokens: 4096
      max_messages: 50

  - name: response-cache
    type: transform
    stage: before_request
    enabled: false
    config:
      max_age: 300
      max_entries: 1000

  - name: request-logger
    type: logging
    stage: before_request
    enabled: true
    config:
      level: info
      # Optional persistent request log storage.
      # When disabled, logs are emitted only to stdout.
      persist: false
      # backend: sqlite | postgres
      backend: sqlite
      # SQLite file path or Postgres DSN (required for postgres backend).
      dsn: ferrogw-requests.db

  - name: pii-redact
    type: guardrail
    stage: before_request
    enabled: false
    config:
      action: redact
      redact_mode: replace_type
      apply_to: input
      entities: []

  - name: secret-scan
    type: guardrail
    stage: before_request
    enabled: false
    config:
      action: block
      entropy_check: true

  - name: prompt-shield
    type: guardrail
    stage: before_request
    enabled: false
    config:
      action: block
      threshold: 0.90
      apply_to: user_messages

  - name: schema-guard
    type: guardrail
    stage: after_request
    enabled: false
    config:
      apply_to: output
      action: block
      extract_json: true
      schema:
        type: object
        required: [name, confidence]
        properties:
          name:
            type: string
          confidence:
            type: number
            minimum: 0
            maximum: 1

  - name: regex-guard
    type: guardrail
    stage: before_request
    enabled: false
    config:
      rules: []

# MCP (Model Context Protocol) agentic tool servers.
# When configured, the gateway injects these tools into every chat completion
# request and runs an agentic loop when the LLM returns tool_calls.
# Requires MCP 2025-11-25 Streamable HTTP servers.
mcp_servers:
  # Local filesystem tool server (no auth required).
  - name: filesystem
    url: "http://localhost:3001/mcp"
    timeout_seconds: 10
    max_call_depth: 3

  # Database tool server restricted to read-only tools.
  - name: database
    url: "https://mcp-db.internal/mcp"
    headers:
      Authorization: "Bearer ${MCP_DB_TOKEN}"
    allowed_tools:
      - query_readonly
      - list_tables
    timeout_seconds: 15
    max_call_depth: 5

  # Web-search tool server.
  - name: web-search
    url: "https://mcp-search.example.com/mcp"
    allowed_tools:
      - web_search
      - web_read
    timeout_seconds: 20
