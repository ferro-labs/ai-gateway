<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Gateway — {{.PageTitle}}</title>
  <link rel="stylesheet" href="/dashboard/static/style.css" />
  <link rel="stylesheet" href="/dashboard/static/vendor/uplot.min.css" />
</head>
<body>
<div class="app">
  <nav class="sidebar">
    <div class="sidebar-logo">
      <img src="/logo.png" alt="AI Gateway" />
      AI Gateway
    </div>
    <div class="sidebar-nav">
      <a href="/dashboard" {{if eq .ActivePage "getting-started"}}class="active"{{end}}>Getting Started</a>
      <a href="/dashboard/overview" {{if eq .ActivePage "overview"}}class="active"{{end}}>Overview</a>
      <a href="/dashboard/keys" {{if eq .ActivePage "keys"}}class="active"{{end}}>API Keys</a>
      <a href="/dashboard/logs" {{if eq .ActivePage "logs"}}class="active"{{end}}>Request Logs</a>
      <a href="/dashboard/providers" {{if eq .ActivePage "providers"}}class="active"{{end}}>Providers</a>
      <a href="/dashboard/config" {{if eq .ActivePage "config"}}class="active"{{end}}>Config</a>
      <a href="/dashboard/analytics" {{if eq .ActivePage "analytics"}}class="active"{{end}}>Analytics</a>
      <a href="/dashboard/playground" {{if eq .ActivePage "playground"}}class="active"{{end}}>Playground</a>
    </div>
    <div class="sidebar-footer">
      <a href="https://docs.ferrolabs.ai" target="_blank" rel="noopener">Docs &#x2197;</a>
      <a href="https://github.com/ferro-labs/ai-gateway" target="_blank" rel="noopener">GitHub &#x2197;</a>
    </div>
    <div class="sidebar-version">{{.Version}}</div>
  </nav>
  <div class="main">
    <header class="header">
      <h1 class="header-title">{{.PageTitle}}</h1>
      <div class="header-actions">
        <button id="theme-toggle" class="btn btn-secondary" onclick="toggleDarkMode()" style="width:36px;height:36px;padding:0;font-size:16px;">&#x263E;</button>
        <span id="scope-badge" class="badge" style="display:none;"></span>
        <button id="logout-btn" class="btn btn-sm" style="display:none;" onclick="logout()">Logout</button>
      </div>
    </header>
    <div class="content">
      {{template "content" .}}
    </div>
  </div>
</div>
<script src="/dashboard/static/dashboard.js"></script>
{{template "page-js" .}}
</body>
</html>
